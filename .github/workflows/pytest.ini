[pytest]
# Pytest configuration for DARIVS Protocol

minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Coverage options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-branch
    --cov-fail-under=20

# Markers for categorizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multiple components
    schema: Tests for JSON-LD schema validation
    parser: Tests for JSON-LD parser
    validator: Tests for schema validator
    api: Tests for FastAPI validator endpoint
    slow: Marks tests as slow (deselect with '-m "not slow"')
    asyncio: Marks tests as async

# AsyncIO configuration
asyncio_mode = auto

# Output options
console_output_style = progress
