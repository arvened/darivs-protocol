name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-schema:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov jsonschema jsonld
    
    - name: Validate JSON-LD Schemas
      run: |
        python -m pytest tests/test_schemas.py -v
    
    - name: Check schema compliance
      run: |
        python scripts/validate-schemas.py
    
    - name: Upload schema validation results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: schema-validation-${{ matrix.python-version }}
        path: validation-report.json

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install black flake8 mypy isort
    
    - name: Check code style with black
      run: black --check src/ tests/
    
    - name: Lint with flake8
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Type check with mypy
      run: mypy src/ --ignore-missing-imports

  json-validation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Validate JSON files
      run: |
        python -m json.tool schema/*.json > /dev/null
        python -m json.tool examples/*.jsonld > /dev/null
    
    - name: Validate JSONLD format
      run: |
        pip install jsonld
        python scripts/validate-jsonld.py

  documentation:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check documentation completeness
      run: |
        test -f README.md
        test -f docs/SPECIFICATION.md
        test -f PROJECT_STRUCTURE.md
        test -f LICENSE
        echo "✓ All required documentation files present"
    
    - name: Validate markdown
      run: |
        pip install markdownlint-cli2
        markdownlint-cli2 "**/*.md" --fix
    
    - name: Check for broken links in docs
      uses: gaurav-nelson/github-action-markdown-link-check@v1
      with:
        use-quiet-mode: true
        folder-path: docs

  schema-examples:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        pip install jsonschema jsonld pydantic
    
    - name: Validate example files
      run: |
        python scripts/validate-examples.py
    
    - name: Test examples can be parsed
      run: |
        python -c "
import json
from pathlib import Path

for example in Path('examples').glob('*.jsonld'):
    with open(example) as f:
        data = json.load(f)
    print(f'✓ {example.name} is valid JSON')
"

  release-check:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check version tag
      run: |
        VERSION_TAG=${GITHUB_REF#refs/tags/v}
        echo "Checking release version: $VERSION_TAG"
        grep -q "\"version\": \"$VERSION_TAG\"" schema/version.json || exit 1
        echo "✓ Version matches tag"

  summary:
    runs-on: ubuntu-latest
    needs: [test-schema, lint, json-validation, documentation, schema-examples]
    if: always()
    
    steps:
    - name: CI Pipeline Summary
      run: |
        echo "### CI Pipeline Results 📊"
        echo "- Schema Validation: ${{ needs.test-schema.result }}"
        echo "- Linting: ${{ needs.lint.result }}"
        echo "- JSON Validation: ${{ needs.json-validation.result }}"
        echo "- Documentation: ${{ needs.documentation.result }}"
        echo "- Schema Examples: ${{ needs.schema-examples.result }}"
        echo ""
        if [ "${{ needs.test-schema.result }}" = "failure" ] || [ "${{ needs.lint.result }}" = "failure" ] || [ "${{ needs.json-validation.result }}" = "failure" ]; then
          echo "❌ CI Pipeline FAILED"
          exit 1
        else
          echo "✅ CI Pipeline PASSED"
        fi
